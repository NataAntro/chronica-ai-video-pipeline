<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Архитектура конвейера ИИ-видео Chronica</title>
  <desc id="desc">Поток от модуля сценария через проверку структуры, речь, TTS, субтитры и Remotion к MP4 и манифесту.</desc>
  <rect width="1200" height="440" rx="24" fill="#07111f"/>
  <style>.box{fill:#10233d;stroke:#68d8d6;stroke-width:2}.text{fill:#f8fafc;font:18px Arial;text-anchor:middle}.small{fill:#94a3b8;font:15px Arial;text-anchor:middle}.arrow{stroke:#f7b267;stroke-width:3;marker-end:url(#a)}</style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f7b267"/></marker></defs>
  <text x="600" y="42" class="text" font-weight="bold">Chronica: конвейер ИИ-видео</text>
  <g>
    <rect class="box" x="35" y="85" width="180" height="80" rx="12"/><text class="text" x="125" y="118">Модуль LLM</text><text class="small" x="125" y="145">локально / HTTP</text>
    <rect class="box" x="270" y="85" width="180" height="80" rx="12"/><text class="text" x="360" y="112">Проверка Zod</text><text class="small" x="360" y="140">повтор + исправление</text>
    <rect class="box" x="505" y="85" width="180" height="80" rx="12"/><text class="text" x="595" y="112">Речевые блоки</text><text class="small" x="595" y="140">разбиение для TTS</text>
    <rect class="box" x="740" y="85" width="180" height="80" rx="12"/><text class="text" x="830" y="112">Модуль TTS</text><text class="small" x="830" y="140">локальный WAV / HTTP</text>
    <rect class="box" x="975" y="85" width="190" height="80" rx="12"/><text class="text" x="1070" y="112">Озвучка</text><text class="small" x="1070" y="140">фрагменты → WAV</text>
    <line class="arrow" x1="215" y1="125" x2="265" y2="125"/><line class="arrow" x1="450" y1="125" x2="500" y2="125"/><line class="arrow" x1="685" y1="125" x2="735" y2="125"/><line class="arrow" x1="920" y1="125" x2="970" y2="125"/>
    <rect class="box" x="270" y="260" width="220" height="80" rx="12"/><text class="text" x="380" y="290">Субтитры</text><text class="small" x="380" y="318">резервная разметка</text>
    <rect class="box" x="530" y="260" width="180" height="80" rx="12"/><text class="text" x="620" y="290">Remotion</text><text class="small" x="620" y="318">программная сборка</text>
    <rect class="box" x="750" y="260" width="180" height="80" rx="12"/><text class="text" x="840" y="290">video.mp4</text><text class="small" x="840" y="318">H.264</text>
    <rect class="box" x="970" y="260" width="195" height="80" rx="12"/><text class="text" x="1067" y="290">Манифест</text><text class="small" x="1067" y="318">SHA-256 + размер</text>
    <path class="arrow" d="M1070 165 V210 H380 V255" fill="none"/><line class="arrow" x1="490" y1="300" x2="525" y2="300"/><line class="arrow" x1="710" y1="300" x2="745" y2="300"/><line class="arrow" x1="930" y1="300" x2="965" y2="300"/>
  </g>
  <text class="small" x="600" y="400">Локальная реализация воспроизводит весь медиапроцесс без внешних учётных данных.</text>
</svg>
